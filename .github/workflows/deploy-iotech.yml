name: Deploy IØTech to Cloudflare Workers

on:
  workflow_dispatch: # allows manual trigger from GitHub Actions UI
  push:
    branches: [main]
    paths:
      - "templates/theme-iotech-cloudflare-v3/**"
      - "packages/core/**"
      - "packages/admin/**"
      - "packages/auth/**"
      - "packages/auth-atproto/**"
      - "packages/blocks/**"
      - "packages/cloudflare/**"
      - "packages/plugins/markdown-wiki/**"
      - "pnpm-lock.yaml"

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm --filter @iotech/theme-iotech-cloudflare run deploy
